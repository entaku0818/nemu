name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v5
      - name: Run SwiftLint
        working-directory: ios/nemu
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    name: Build & Test (iOS)
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)
          echo "Selected: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP"
          xcodebuild -version

      - name: Pick iPhone simulator
        id: sim
        run: |
          # iPhone 行の最後 = 最新 iOS ランタイムのデバイスを選ぶ
          DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9][^(]*" | tail -n 1 | xargs)
          if [ -z "$DEVICE" ]; then
            echo "No iPhone simulator available" >&2
            xcrun simctl list devices >&2
            exit 1
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build and run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/nemu/nemu.xcodeproj \
            -scheme nemu \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -only-testing:nemuTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
