<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nemu（ねむ） - 睡眠管理アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0a0a14;
      color: #f0f0f5;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 80px 24px 60px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0a0a14 100%);
    }
    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      background: linear-gradient(135deg, #2d2b55 0%, #1a1a3e 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(100, 80, 200, 0.3);
    }
    h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { color: #8888aa; margin-top: 8px; font-size: 1.1rem; }
    .tagline { margin-top: 20px; font-size: 1.3rem; color: #c0b0ff; }
    .badge {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 28px;
      background: #ffffff;
      color: #000;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
    }
    .features {
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .features h2 { font-size: 1.5rem; margin-bottom: 28px; text-align: center; color: #c0b0ff; }
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px;
      background: #14142a;
      border-radius: 16px;
      border: 1px solid #2a2a44;
    }
    .feature-icon { font-size: 2rem; flex-shrink: 0; }
    .feature h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .feature p { font-size: 0.9rem; color: #8888aa; }
    footer {
      text-align: center;
      padding: 40px 24px;
      color: #555570;
      font-size: 0.85rem;
      border-top: 1px solid #1a1a2e;
    }
    footer a { color: #7070aa; text-decoration: none; margin: 0 12px; }
    footer a:hover { color: #c0b0ff; }
  </style>
</head>
<body>
  <header>
    <div class="app-icon">🌙</div>
    <h1>Nemu（ねむ）</h1>
    <p class="subtitle">Sleep Tracker</p>
    <p class="tagline">眠りを、資産に。</p>
    <a class="badge" href="https://apps.apple.com/jp/app/id6738091870" target="_blank">
      App Store でダウンロード
    </a>
  </header>

  <section class="features">
    <h2>主な機能</h2>
    <div class="feature">
      <span class="feature-icon">⏰</span>
      <div>
        <h3>スマートアラーム</h3>
        <p>日の出・体動・明るさの3条件で最適な起床タイミングをお知らせ。サイレントモードでも確実に鳴るシステムレベルのアラーム搭載。</p>
      </div>
    </div>
    <div class="feature">
      <span class="feature-icon">📊</span>
      <div>
        <h3>睡眠スコア</h3>
        <p>睡眠時間・体動・環境を分析して毎朝スコアを算出。週間レポートで1週間のトレンドを一目で確認。</p>
      </div>
    </div>
    <div class="feature">
      <span class="feature-icon">🔒</span>
      <div>
        <h3>ロック画面ウィジェット</h3>
        <p>次のアラーム時刻をいつでもチェック。就寝中の経過時間とアラームをシンプルに表示。</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2024 Nemu App</p>
    <p style="margin-top: 12px;">
      <a href="/privacy">プライバシーポリシー</a>
      <a href="/support">サポート</a>
    </p>
  </footer>
</body>
</html>
